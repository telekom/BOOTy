name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-go:
    name: Analyze (go)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Initialize CodeQL (go)
        uses: github/codeql-action/init@v4
        with:
          languages: go
          build-mode: manual

      - name: Build for CodeQL extraction
        run: go build ./...

      - name: Perform CodeQL Analysis (go)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:go"

  analyze-actions:
    name: Analyze (actions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL (actions)
        uses: github/codeql-action/init@v4
        with:
          languages: actions
          build-mode: none

      - name: Perform CodeQL Analysis (actions)
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:actions"
