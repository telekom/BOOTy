name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CONTAINERLAB_VERSION: "0.62.2"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Check coverage gate (40%)
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 40" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below the 40% minimum"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run E2E tests
        run: |
          # Run e2e tests excluding kvm/ (KVM tests run in the dedicated KVM matrix job)
          go test -tags e2e -v -race $(go list -tags e2e ./test/e2e/... | grep -v /kvm)

  build:
    name: Build (${{ matrix.arch }})
    needs: [lint, test, e2e]
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Assert runner architecture
        run: |
          RUNNER_ARCH="$(uname -m)"
          case "${RUNNER_ARCH}" in
            x86_64)  EXPECTED="amd64" ;;
            aarch64) EXPECTED="arm64" ;;
            *)
              echo "::error::unsupported runner architecture: ${RUNNER_ARCH}"
              exit 1
              ;;
          esac
          if [ "${EXPECTED}" != "${{ matrix.arch }}" ]; then
            echo "::error::runner architecture ${EXPECTED} does not match matrix.arch ${{ matrix.arch }}"
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
          CC: gcc
        run: go build -ldflags "-s -w -linkmode external -extldflags '-static'" -o booty-${{ matrix.arch }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: booty-${{ matrix.arch }}
          path: booty-${{ matrix.arch }}

  build-flavours:
    name: Build Flavours (slim + micro + gobgp)
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build slim initramfs
        run: |
          docker buildx build --platform linux/amd64 --target slim \
            --output type=local,dest=out-slim -f initrd.Dockerfile .
          echo "Slim initramfs:"
          ls -lh out-slim/initramfs.cpio.gz

      - name: Build micro initramfs
        run: |
          docker buildx build --platform linux/amd64 --target micro \
            --output type=local,dest=out-micro -f initrd.Dockerfile .
          echo "Micro initramfs:"
          ls -lh out-micro/initramfs.cpio.gz

      - name: Build gobgp initramfs
        run: |
          docker buildx build --platform linux/amd64 --target gobgp \
            --output type=local,dest=out-gobgp -f initrd.Dockerfile .
          echo "GoBGP initramfs:"
          ls -lh out-gobgp/initramfs.cpio.gz

      - name: Verify size ordering
        run: |
          docker buildx build --platform linux/amd64 \
            --output type=local,dest=out-default -f initrd.Dockerfile .

          DEFAULT_SIZE=$(stat -c%s out-default/initramfs.cpio.gz)
          SLIM_SIZE=$(stat -c%s out-slim/initramfs.cpio.gz)
          MICRO_SIZE=$(stat -c%s out-micro/initramfs.cpio.gz)
          GOBGP_SIZE=$(stat -c%s out-gobgp/initramfs.cpio.gz)

          echo "Default: $(numfmt --to=iec $DEFAULT_SIZE)"
          echo "GoBGP:   $(numfmt --to=iec $GOBGP_SIZE)"
          echo "Slim:    $(numfmt --to=iec $SLIM_SIZE)"
          echo "Micro:   $(numfmt --to=iec $MICRO_SIZE)"

          if [ "$MICRO_SIZE" -ge "$SLIM_SIZE" ]; then
            echo "::error::Micro ($MICRO_SIZE) should be smaller than slim ($SLIM_SIZE)"
            exit 1
          fi
          if [ "$SLIM_SIZE" -ge "$GOBGP_SIZE" ]; then
            echo "::error::Slim ($SLIM_SIZE) should be smaller than gobgp ($GOBGP_SIZE)"
            exit 1
          fi
          if [ "$GOBGP_SIZE" -ge "$DEFAULT_SIZE" ]; then
            echo "::error::GoBGP ($GOBGP_SIZE) should be smaller than default ($DEFAULT_SIZE)"
            exit 1
          fi
          echo "PASS: micro < slim < gobgp < default"

      - name: Verify slim contents
        run: |
          gzip -dc out-slim/initramfs.cpio.gz | cpio -t 2>/dev/null > slim-files.txt
          echo "Slim file count: $(wc -l < slim-files.txt)"

          # Must contain BOOTy init and busybox
          grep -q "^init$\|^./init$" slim-files.txt || (echo "FAIL: init missing"; exit 1)
          grep -q "bin/busybox" slim-files.txt || (echo "FAIL: busybox missing"; exit 1)
          grep -q "bin/ip" slim-files.txt || (echo "FAIL: ip missing"; exit 1)

          # Must NOT contain FRR or LVM
          if grep -q "sbin/bgpd" slim-files.txt; then echo "FAIL: bgpd present in slim"; exit 1; fi
          if grep -q "sbin/lvm" slim-files.txt; then echo "FAIL: lvm present in slim"; exit 1; fi
          echo "PASS: slim contents verified"

      - name: Verify micro contents
        run: |
          gzip -dc out-micro/initramfs.cpio.gz | cpio -t 2>/dev/null > micro-files.txt
          echo "Micro file count: $(wc -l < micro-files.txt)"

          # Must contain BOOTy init
          grep -q "^init$\|^./init$" micro-files.txt || (echo "FAIL: init missing"; exit 1)

          # Must NOT contain busybox, FRR, LVM, or external tools
          if grep -q "bin/busybox" micro-files.txt; then echo "FAIL: busybox present in micro"; exit 1; fi
          if grep -q "sbin/bgpd" micro-files.txt; then echo "FAIL: bgpd present in micro"; exit 1; fi
          if grep -q "bin/ip" micro-files.txt; then echo "FAIL: ip present in micro"; exit 1; fi
          echo "PASS: micro contents verified"

      - name: Verify gobgp contents
        run: |
          gzip -dc out-gobgp/initramfs.cpio.gz | cpio -t 2>/dev/null > gobgp-files.txt
          echo "GoBGP file count: $(wc -l < gobgp-files.txt)"

          # Must contain BOOTy init, busybox, networking, and disk tools
          grep -q "^init$\|^./init$" gobgp-files.txt || (echo "FAIL: init missing"; exit 1)
          grep -q "bin/busybox" gobgp-files.txt || (echo "FAIL: busybox missing"; exit 1)
          grep -q "bin/ip" gobgp-files.txt || (echo "FAIL: ip missing"; exit 1)
          grep -q "sbin/lvm" gobgp-files.txt || (echo "FAIL: lvm missing"; exit 1)

          # Must NOT contain FRR (GoBGP is in-process Go)
          if grep -q "sbin/bgpd" gobgp-files.txt; then echo "FAIL: bgpd present in gobgp"; exit 1; fi
          if grep -q "sbin/zebra" gobgp-files.txt; then echo "FAIL: zebra present in gobgp"; exit 1; fi
          if grep -q "bin/vtysh" gobgp-files.txt; then echo "FAIL: vtysh present in gobgp"; exit 1; fi
          echo "PASS: gobgp contents verified"

      - name: Upload build flavour artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-flavours
          path: |
            out-slim/initramfs.cpio.gz
            out-micro/initramfs.cpio.gz
            out-gobgp/initramfs.cpio.gz

  kvm-boot:
    name: KVM Boot Validation
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install QEMU and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 cpio zstd

      - name: Build initramfs image
        run: |
          # Build BOOTy as a static binary for linux/amd64
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-linkmode external -extldflags '-static' -s -w" -o booty

          # Create initramfs directory structure
          mkdir -p initramfs/{bin,sbin,dev,proc,sys,etc,tmp,usr/bin,lib/modules,mnt,home}

          # Create device nodes so the kernel can give init a working console
          sudo mknod initramfs/dev/console c 5 1
          sudo mknod initramfs/dev/ttyS0 c 4 64
          sudo mknod initramfs/dev/null c 1 3

          # Extract busybox from the Dependabot-tracked Docker image
          BUSYBOX_IMAGE=$(grep '^FROM' test/e2e/assets/busybox/Dockerfile | awk '{print $2}')
          docker run --rm --platform=linux/amd64 "$BUSYBOX_IMAGE" cat /bin/busybox > initramfs/bin/busybox
          chmod +x initramfs/bin/busybox
          # Verify that busybox is statically linked to avoid non-bootable initramfs output.
          if ! file initramfs/bin/busybox | grep -Eqi 'statically linked|static-pie linked'; then
            echo "ERROR: extracted /bin/busybox is not statically linked"
            file initramfs/bin/busybox || true
            exit 1
          fi
          cd initramfs/bin
          for cmd in sh mount umount insmod setsid cttyhack chroot; do
            ln -sf busybox "$cmd"
          done
          cd ../..
          cd initramfs/usr/bin && ln -sf ../../bin/busybox setsid && cd ../../..

          # Copy BOOTy binary
          cp booty initramfs/booty

          # Copy e1000 kernel module (QEMU default virtual NIC)
          MOD_PATH=$(find /lib/modules/$(uname -r) -name "e1000.ko*" | head -1)
          if [ -n "$MOD_PATH" ]; then
            case "$MOD_PATH" in
              *.zst) zstd -d "$MOD_PATH" -o initramfs/lib/modules/e1000.ko ;;
              *.xz)  xz -dc "$MOD_PATH" > initramfs/lib/modules/e1000.ko ;;
              *.gz)  gzip -dc "$MOD_PATH" > initramfs/lib/modules/e1000.ko ;;
              *)     cp "$MOD_PATH" initramfs/lib/modules/e1000.ko ;;
            esac
            echo "Copied e1000 module from $MOD_PATH"
          else
            echo "WARNING: e1000 module not found"
          fi

          # Create init wrapper: loads NIC driver before starting BOOTy
          cat > initramfs/init << 'INITEOF'
          #!/bin/sh
          /bin/insmod /lib/modules/e1000.ko 2>/dev/null || true
          exec /booty
          INITEOF
          chmod +x initramfs/init

          # Add minimal /deploy/vars for CAPRF mode (dry-run)
          mkdir -p initramfs/deploy
          cat > initramfs/deploy/vars << 'VARSEOF'
          export MODE="dry-run"
          export DRY_RUN="true"
          export HOSTNAME="kvm-boot-test"
          VARSEOF

          # Package initramfs
          cd initramfs
          sudo find . -print0 | sudo cpio --null -ov --format=newc 2>/dev/null | gzip > ../test-initramfs.cpio.gz
          cd ..

      - name: Prepare kernel
        run: |
          sudo cp /boot/vmlinuz-$(uname -r) vmlinuz
          sudo chmod 644 vmlinuz

      - name: Boot with QEMU and validate
        timeout-minutes: 5
        run: |
          timeout 120 qemu-system-x86_64 \
            -kernel vmlinuz \
            -initrd test-initramfs.cpio.gz \
            -append "console=ttyS0 panic=1" \
            -m 512 \
            -nographic \
            -no-reboot \
            -net nic,macaddr=52:54:00:12:34:56,model=e1000 \
            -net user \
            -serial file:serial.log \
            2>&1 || true

          echo ""
          echo "======================================="
          echo "        Serial Console Output          "
          echo "======================================="
          cat serial.log || true
          echo ""
          echo "======================================="

          PASS=true

          if grep -q "starting BOOTy\|Starting BOOTy" serial.log 2>/dev/null; then
            echo "PASS: BOOTy main flow reached"
          else
            echo "FAIL: BOOTy did not reach main flow"
            PASS=false
          fi

          if grep -q "CAPRF mode active" serial.log 2>/dev/null; then
            echo "PASS: CAPRF mode initialized successfully"
          else
            echo "FAIL: CAPRF mode did not initialize"
            PASS=false
          fi

          if grep -q "dry-run" serial.log 2>/dev/null; then
            echo "PASS: Dry-run mode detected"
          else
            echo "FAIL: Dry-run mode not detected"
            PASS=false
          fi

          # Check for unexpected ERROR-level log entries.
          # Allow-list: errors expected in minimal CI environments (no disk, no provisioning server response).
          ALLOWED_ERRORS="no suitable disk found|detect-disk|partition-disk|parse-partitions|format-disk|stream-image|[Pp]rovisioning failed|[Pp]rovisioning step|[Dd]eprovisioning failed|[Dd]eprovisioning step|Connecting to provisioning server|DEBUG DUMP|=== DEBUG|=== CONFIG|Disk Error|msg=DEBUG|debug dump|Debug command|DEBUG env|CAPRF client|dry-run failed"
          UNEXPECTED=$(grep 'level=ERROR' serial.log 2>/dev/null | grep -vE "$ALLOWED_ERRORS" || true)
          if [ -n "$UNEXPECTED" ]; then
            echo "FAIL: Unexpected ERROR-level log entries found:"
            echo "$UNEXPECTED"
            PASS=false
          else
            echo "PASS: No unexpected ERROR-level log entries"
          fi

          if [ "$PASS" = "false" ]; then
            echo ""
            echo "E2E BOOT VALIDATION FAILED"
            exit 1
          fi

          echo ""
          echo "ALL E2E CHECKS PASSED"

      - name: Upload serial log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: kvm-boot-serial-log
          path: serial.log
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          [ -f server.pid ] && kill $(cat server.pid) 2>/dev/null || true

  e2e-clab:
    name: E2E ContainerLab
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Generate test disk image
        run: sudo test/e2e/clab/create-test-image.sh test/e2e/clab/images

      - name: Install ContainerLab
        run: curl --connect-timeout 30 --max-time 120 -fsSL https://get.containerlab.dev | sudo bash -s -- -v ${{ env.CONTAINERLAB_VERSION }}

      - name: Deploy topology
        run: sudo containerlab deploy --topo test/e2e/clab/topology.clab.yml

      - name: Wait for BGP convergence
        run: |
          echo "Waiting for BGP sessions to establish..."
          for i in $(seq 1 90); do
            # An established BGP neighbor shows an uptime (e.g. 00:00:27) in the Up/Down column.
            # Non-established neighbors show a state name like Active, Idle, Connect, etc.
            if sudo docker exec clab-booty-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null | grep -qE "leaf01.*[0-9]{2}:[0-9]{2}:[0-9]{2}"; then
              echo "BGP sessions established after ${i}s"
              sudo docker exec clab-booty-lab-spine01 vtysh -c "show bgp summary"
              break
            fi
            sleep 1
          done
          if ! sudo docker exec clab-booty-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null | grep -qE "leaf01.*[0-9]{2}:[0-9]{2}:[0-9]{2}"; then
            echo "BGP sessions did not establish in 90s"
            sudo docker exec clab-booty-lab-spine01 vtysh -c "show bgp summary" || true
            exit 1
          fi
          echo "Polling for EVPN routes on leaf01 (up to 30s)..."
          for i in $(seq 1 30); do
            if sudo docker exec clab-booty-lab-leaf01 ip -d link show type vxlan 2>/dev/null | grep -q "vxlan"; then
              echo "EVPN data-plane ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run E2E integration tests
        env:
          BOOTY_TOPOLOGY: lab
          # -parallel limits t.Parallel() subtests (not used in e2e_integration); GOMAXPROCS caps
          # OS threads to reduce runner contention.
          GOMAXPROCS: "2"
        run: go test -tags e2e_integration -v -race -count=1 -timeout 10m ./test/e2e/integration/...

      - name: Collect container logs
        if: always()
        timeout-minutes: 3
        run: |
          mkdir -p clab-logs
          for c in spine01 leaf01 client nginx caprf-mock; do
            name="clab-booty-lab-${c}"
            echo "=== Logs for ${name} ===" | tee clab-logs/${c}.log
            timeout 30 sudo docker logs "${name}" >> clab-logs/${c}.log 2>&1 || echo "(no logs)"
          done

          echo ""
          echo "=== FRR Routing State (spine01) ==="
          timeout 15 sudo docker exec clab-booty-lab-spine01 vtysh -c "show bgp summary json" 2>/dev/null | tee clab-logs/spine01-bgp-summary.txt || true
          timeout 15 sudo docker exec clab-booty-lab-spine01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null | tee clab-logs/spine01-evpn.txt || true
          timeout 15 sudo docker exec clab-booty-lab-spine01 vtysh -c "show ip route" 2>/dev/null | tee clab-logs/spine01-routes.txt || true

          echo ""
          echo "=== FRR Routing State (leaf01) ==="
          timeout 15 sudo docker exec clab-booty-lab-leaf01 vtysh -c "show bgp summary json" 2>/dev/null | tee clab-logs/leaf01-bgp-summary.txt || true
          timeout 15 sudo docker exec clab-booty-lab-leaf01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null | tee clab-logs/leaf01-evpn.txt || true
          timeout 15 sudo docker exec clab-booty-lab-leaf01 vtysh -c "show ip route" 2>/dev/null | tee clab-logs/leaf01-routes.txt || true

          echo ""
          echo "=== EVPN Data Plane State ==="
          for c in spine01 leaf01; do
            name="clab-booty-lab-${c}"
            timeout 5 sudo docker exec "${name}" bridge fdb show 2>/dev/null | tee clab-logs/${c}-fdb.txt || true
            timeout 5 sudo docker exec "${name}" ip -d link show type vxlan 2>/dev/null | tee clab-logs/${c}-vxlan.txt || true
            timeout 5 sudo docker exec "${name}" ip neigh show 2>/dev/null | tee clab-logs/${c}-neigh.txt || true
          done

      - name: Upload ContainerLab logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: clab-logs
          path: clab-logs/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: sudo containerlab destroy --topo test/e2e/clab/topology.clab.yml --cleanup

  uefi-iso-boot:
    name: UEFI ISO Boot Validation
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install UEFI and ISO dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf xorriso grub-efi-amd64-bin \
            grub-common mtools cpio zstd dosfstools \
            isolinux syslinux-common swtpm swtpm-tools

      - name: Build initramfs image
        run: |
          # Build BOOTy as a static binary for linux/amd64
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -ldflags "-linkmode external -extldflags '-static' -s -w" -o booty

          # Create initramfs directory structure
          mkdir -p initramfs/{bin,sbin,dev,proc,sys,etc,tmp,usr/bin,lib/modules,mnt,home}

          # Create device nodes so the kernel can give init a working console
          sudo mknod initramfs/dev/console c 5 1
          sudo mknod initramfs/dev/ttyS0 c 4 64
          sudo mknod initramfs/dev/null c 1 3

          # Extract busybox from the Dependabot-tracked Docker image
          BUSYBOX_IMAGE=$(grep '^FROM' test/e2e/assets/busybox/Dockerfile | awk '{print $2}')
          docker run --rm --platform=linux/amd64 "$BUSYBOX_IMAGE" cat /bin/busybox > initramfs/bin/busybox
          chmod +x initramfs/bin/busybox
          # Verify that busybox is statically linked to avoid non-bootable initramfs output.
          if ! file initramfs/bin/busybox | grep -Eqi 'statically linked|static-pie linked'; then
            echo "ERROR: extracted /bin/busybox is not statically linked"
            file initramfs/bin/busybox || true
            exit 1
          fi
          cd initramfs/bin
          for cmd in sh mount umount insmod setsid cttyhack chroot; do
            ln -sf busybox "$cmd"
          done
          cd ../..
          cd initramfs/usr/bin && ln -sf ../../bin/busybox setsid && cd ../../..

          # Copy BOOTy binary
          cp booty initramfs/booty

          # Copy e1000 kernel module (QEMU default virtual NIC)
          MOD_PATH=$(find /lib/modules/$(uname -r) -name "e1000.ko*" | head -1)
          if [ -n "$MOD_PATH" ]; then
            case "$MOD_PATH" in
              *.zst) zstd -d "$MOD_PATH" -o initramfs/lib/modules/e1000.ko ;;
              *.xz)  xz -dc "$MOD_PATH" > initramfs/lib/modules/e1000.ko ;;
              *.gz)  gzip -dc "$MOD_PATH" > initramfs/lib/modules/e1000.ko ;;
              *)     cp "$MOD_PATH" initramfs/lib/modules/e1000.ko ;;
            esac
          fi

          # Create init wrapper
          cat > initramfs/init << 'INITEOF'
          #!/bin/sh
          /bin/insmod /lib/modules/e1000.ko 2>/dev/null || true
          exec /booty
          INITEOF
          chmod +x initramfs/init

          # Add minimal /deploy/vars for CAPRF mode (dry-run)
          mkdir -p initramfs/deploy
          cat > initramfs/deploy/vars << 'VARSEOF'
          export MODE="dry-run"
          export DRY_RUN="true"
          export HOSTNAME="uefi-boot-test"
          VARSEOF

          # Package initramfs
          cd initramfs
          sudo find . -print0 | sudo cpio --null -ov --format=newc 2>/dev/null | gzip > ../test-initramfs.cpio.gz
          cd ..

      - name: Prepare kernel
        run: |
          sudo cp /boot/vmlinuz-$(uname -r) vmlinuz
          sudo chmod 644 vmlinuz

      - name: Create UEFI-bootable ISO
        run: |
          # Create ISO directory structure
          mkdir -p iso/boot/grub iso/EFI/BOOT
          cp vmlinuz iso/boot/vmlinuz
          cp test-initramfs.cpio.gz iso/boot/initrd

          # Write GRUB configuration
          cat > iso/boot/grub/grub.cfg << 'EOF'
          search --no-floppy --set=root --file /boot/vmlinuz
          set timeout=0
          set default=0
          menuentry 'BOOTy UEFI Test' {
            linux /boot/vmlinuz console=ttyS0 panic=1
            initrd /boot/initrd
          }
          EOF

          # Create standalone GRUB EFI binary
          grub-mkstandalone -O x86_64-efi -o iso/EFI/BOOT/BOOTX64.EFI \
            --locales="" --fonts="" \
            "boot/grub/grub.cfg=iso/boot/grub/grub.cfg"

          # Create FAT image for EFI System Partition
          dd if=/dev/zero of=iso/efi.img bs=1M count=8
          mkfs.vfat iso/efi.img
          mmd -i iso/efi.img ::/EFI ::/EFI/BOOT
          mcopy -i iso/efi.img iso/EFI/BOOT/BOOTX64.EFI ::/EFI/BOOT/

          # Create UEFI-bootable ISO
          xorriso -as mkisofs \
            -R -J \
            -o test-uefi.iso \
            -eltorito-alt-boot \
            -e efi.img \
            -no-emul-boot \
            iso/

          ls -lh test-uefi.iso
          echo "UEFI ISO created successfully"

      - name: Boot ISO with UEFI firmware (OVMF) and validate
        timeout-minutes: 5
        run: |
          # Find OVMF firmware — prefer non-secboot 4M variant for reliable unsigned GRUB boot.
          # The secboot variant rejects unsigned EFI binaries, causing silent boot failure.
          OVMF_CODE=$(find /usr/share -name "OVMF_CODE_4M.fd" 2>/dev/null | head -1)
          if [ -z "$OVMF_CODE" ]; then
            OVMF_CODE=$(find /usr/share -name "OVMF_CODE.fd" 2>/dev/null | head -1)
          fi
          OVMF_VARS=$(find /usr/share -name "OVMF_VARS_4M.fd" 2>/dev/null | head -1)
          if [ -z "$OVMF_VARS" ]; then
            OVMF_VARS=$(find /usr/share -name "OVMF_VARS.fd" 2>/dev/null | head -1)
          fi
          if [ -z "$OVMF_CODE" ] || [ -z "$OVMF_VARS" ]; then
            echo "OVMF firmware not found"
            exit 1
          fi
          echo "Using OVMF code: $OVMF_CODE"
          echo "Using OVMF vars: $OVMF_VARS"
          cp "$OVMF_VARS" /tmp/ovmf_vars.fd

          timeout 120 qemu-system-x86_64 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file=/tmp/ovmf_vars.fd \
            -cdrom test-uefi.iso \
            -boot d \
            -m 512 \
            -nographic \
            -no-reboot \
            -net nic,macaddr=52:54:00:12:34:56,model=e1000 \
            -net user \
            -serial file:serial-uefi.log \
            2>&1 || true

          echo ""
          echo "========================================="
          echo "     UEFI ISO Serial Console Output      "
          echo "========================================="
          cat serial-uefi.log || true
          echo ""
          echo "========================================="

          PASS=true

          # Primary check: BOOTy binary started (proves UEFI firmware → GRUB → kernel → initramfs → BOOTy)
          if grep -q "starting BOOTy\|Starting BOOTy" serial-uefi.log 2>/dev/null; then
            echo "PASS: BOOTy started under UEFI — full EFI boot chain working"
          else
            echo "FAIL: BOOTy did not start under UEFI"
            PASS=false
          fi

          # Secondary check: provisioning flow reached
          if grep -q "beginning provisioning process\|Beginning provisioning process" serial-uefi.log 2>/dev/null; then
            echo "PASS: BOOTy provisioning flow reached under UEFI"
          else
            echo "FAIL: BOOTy provisioning flow not reached under UEFI"
            PASS=false
          fi

          # Network checks are best-effort under UEFI — serial buffer flushing
          # with OVMF can be incomplete compared to direct kernel boot.
          if grep -q "CAPRF mode active" serial-uefi.log 2>/dev/null; then
            echo "PASS: CAPRF mode initialized under UEFI"
          else
            echo "INFO: CAPRF mode not detected in serial output (may be UEFI serial buffering)"
          fi

          if [ "$PASS" = "false" ]; then
            echo ""
            echo "UEFI ISO BOOT VALIDATION FAILED"
            exit 1
          fi

          echo ""
          echo "ALL UEFI ISO BOOT CHECKS PASSED"

      - name: Upload UEFI serial log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: uefi-iso-boot-serial-log
          path: serial-uefi.log
          if-no-files-found: ignore

      - name: Upload ISO artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: booty-uefi-iso
          path: test-uefi.iso
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          [ -f server.pid ] && kill $(cat server.pid) 2>/dev/null || true

  linux-e2e:
    name: Linux E2E (Privileged)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install disk utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y fdisk gdisk e2fsprogs xfsprogs cloud-guest-utils parted util-linux

      - name: Run Linux E2E tests
        run: sudo -E $(which go) test -tags linux_e2e -v -count=1 -timeout 5m ./test/e2e/linux/...

  e2e-boot:
    name: E2E Boot (ContainerLab)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build BOOTy test container image
        run: docker build -t booty-test:latest -f test/e2e/clab/booty-test.Dockerfile .

      - name: Generate test disk image
        run: sudo test/e2e/clab/create-test-image.sh test/e2e/clab/images

      - name: Install ContainerLab
        run: |
          for attempt in 1 2 3; do
            echo "Installing ContainerLab (attempt ${attempt}/3)..."
            if curl -fsSL https://get.containerlab.dev | sudo bash -s -- -v ${{ env.CONTAINERLAB_VERSION }}; then
              echo "ContainerLab installed successfully"
              exit 0
            fi
            echo "Attempt ${attempt} failed, retrying in 5s..."
            sleep 5
          done
          echo "ContainerLab installation failed after 3 attempts"
          exit 1

      - name: Deploy boot topology
        run: sudo containerlab deploy --topo test/e2e/clab/topology-boot.clab.yml

      - name: Wait for BGP convergence
        run: |
          echo "Waiting for BGP sessions to establish..."
          for i in $(seq 1 180); do
            if sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null | grep -qE "leaf01.*[0-9]{2}:[0-9]{2}:[0-9]{2}"; then
              echo "BGP sessions established after ${i}s"
              sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp summary"
              break
            fi
            sleep 1
          done
          if ! sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null | grep -qE "leaf01.*[0-9]{2}:[0-9]{2}:[0-9]{2}"; then
            echo "BGP sessions did not establish in 180s"
            sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp summary" || true
            exit 1
          fi
          echo "Waiting for EVPN routes to appear after BGP convergence..."
          for i in $(seq 1 60); do
            if sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null | grep -qE "\[[0-9]+\]:\[[0-9]+\]"; then
              echo "EVPN routes detected after ${i}s"
              sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp l2vpn evpn"
              break
            fi
            sleep 1
          done
          if ! sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null | grep -qE "\[[0-9]+\]:\[[0-9]+\]"; then
            echo "EVPN routes did not appear in 60s after BGP convergence"
            sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp summary" || true
            sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp l2vpn evpn" || true
            exit 1
          fi

      - name: Run BOOTy boot E2E tests
        # -parallel=2 is a no-op without t.Parallel(); use GOMAXPROCS to cap OS threads.
        env:
          GOMAXPROCS: "2"
        run: go test -tags e2e_boot -v -race -count=1 -timeout 30m ./test/e2e/integration/...

      - name: Collect BOOTy container logs
        if: always()
        timeout-minutes: 8
        run: |
          mkdir -p boot-logs

          for node in booty-provision booty-deprovision booty-standby; do
            name="clab-booty-boot-lab-${node}"
            echo ""
            echo "======================================="
            echo "  ${node} FULL BOOTY LOGS"
            echo "======================================="
            timeout 30 sudo docker logs "${name}" 2>&1 | tee boot-logs/${node}.log || echo "(no logs)"
            echo "======================================="
          done

          echo ""
          echo "======================================="
          echo "  CAPRF Mock Access Log"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-boot-lab-caprf-mock cat /var/log/nginx/access.log 2>/dev/null | tee boot-logs/caprf-access.log || echo "(no logs)"
          echo "======================================="

          echo ""
          echo "======================================="
          echo "  BGP Summary (spine01)"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null | tee boot-logs/bgp-summary.txt || true

          echo ""
          echo "======================================="
          echo "  EVPN State (spine01)"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-boot-lab-spine01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null | tee boot-logs/evpn-state.txt || true

      - name: Upload boot logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: boot-logs
          path: boot-logs/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: sudo containerlab destroy --topo test/e2e/clab/topology-boot.clab.yml --cleanup

  e2e-gobgp:
    name: E2E GoBGP PeerModes
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build GoBGP test image
        run: docker build -t booty-gobgp-test:latest -f test/e2e/clab/booty-gobgp-test.Dockerfile .

      - name: Install ContainerLab
        run: curl -fsSL https://get.containerlab.dev | sudo bash -s -- -v ${{ env.CONTAINERLAB_VERSION }}

      - name: Deploy GoBGP topology
        run: sudo containerlab deploy --topo test/e2e/clab/topology-gobgp.clab.yml

      - name: Wait for BGP convergence
        run: |
          echo "Waiting for GoBGP sessions to establish..."
          for i in $(seq 1 120); do
            ESTABLISHED=$(sudo docker exec clab-booty-gobgp-lab-spine01 vtysh -c "show bgp summary json" 2>/dev/null \
              | grep -c '"state":"Established"' || true)
            if [ "$ESTABLISHED" -ge 5 ]; then
              echo "All BGP sessions established after ${i}s"
              sudo docker exec clab-booty-gobgp-lab-spine01 vtysh -c "show bgp summary"
              break
            fi
            sleep 1
          done
          ESTABLISHED=$(sudo docker exec clab-booty-gobgp-lab-spine01 vtysh -c "show bgp summary json" 2>/dev/null \
            | grep -c '"state":"Established"' || true)
          if [ "$ESTABLISHED" -lt 5 ]; then
            echo "Not all BGP sessions established in 120s"
            sudo docker exec clab-booty-gobgp-lab-spine01 vtysh -c "show bgp summary" || true
            exit 1
          fi
          echo "Polling for EVPN routes on booty-unnumbered (up to 30s)..."
          for i in $(seq 1 30); do
            if sudo docker exec clab-booty-gobgp-lab-booty-unnumbered ip -d link show type vxlan 2>/dev/null | grep -q "vxlan"; then
              echo "EVPN data-plane ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run GoBGP E2E tests
        # -parallel limits t.Parallel() subtests (not used in e2e_gobgp); GOMAXPROCS caps
        # OS threads to reduce runner contention.
        env:
          GOMAXPROCS: "2"
        run: go test -tags e2e_gobgp -v -race -count=1 -timeout 10m ./test/e2e/integration/...

      - name: Collect GoBGP logs
        if: always()
        timeout-minutes: 5
        run: |
          mkdir -p gobgp-logs

          # Container logs (stdout/stderr from all nodes).
          for node in spine01 leaf01 rr01 booty-unnumbered booty-dual booty-numbered client; do
            name="clab-booty-gobgp-lab-${node}"
            timeout 30 sudo docker logs "${name}" >> gobgp-logs/${node}.log 2>&1 || echo "(no logs)"
          done

          # FRR BGP state on spine01 (JSON where possible for structured debugging).
          for cmd in \
            "show bgp summary json" \
            "show bgp l2vpn evpn" \
            "show bgp l2vpn evpn json" \
            "show ip route" \
            "show evpn vni"; do
            slug=$(echo "$cmd" | tr ' ' '-')
            timeout 15 sudo docker exec clab-booty-gobgp-lab-spine01 \
              vtysh -c "$cmd" 2>/dev/null | tee gobgp-logs/spine01-${slug}.txt || true
          done

          # FRR BGP state on rr01.
          for cmd in \
            "show bgp summary json" \
            "show bgp neighbors 10.0.1.1 json"; do
            slug=$(echo "$cmd" | tr ' ' '-')
            timeout 15 sudo docker exec clab-booty-gobgp-lab-rr01 \
              vtysh -c "$cmd" 2>/dev/null | tee gobgp-logs/rr01-${slug}.txt || true
          done

          # Network + EVPN data plane state from each container.
          for node in spine01 leaf01 booty-unnumbered booty-dual booty-numbered; do
            name="clab-booty-gobgp-lab-${node}"
            {
              echo "=== ip -d link show type vxlan ==="
              timeout 5 sudo docker exec "${name}" ip -d link show type vxlan 2>&1 || true
              echo "=== ip addr show ==="
              timeout 5 sudo docker exec "${name}" ip addr show 2>&1 || true
              echo "=== ip -6 addr show ==="
              timeout 5 sudo docker exec "${name}" ip -6 addr show 2>&1 || true
              echo "=== ip -6 neigh show ==="
              timeout 5 sudo docker exec "${name}" ip -6 neigh show 2>&1 || true
              echo "=== ip neigh show ==="
              timeout 5 sudo docker exec "${name}" ip neigh show 2>&1 || true
              echo "=== ip route show ==="
              timeout 5 sudo docker exec "${name}" ip route show 2>&1 || true
              echo "=== ip -6 route show ==="
              timeout 5 sudo docker exec "${name}" ip -6 route show 2>&1 || true
              echo "=== bridge fdb show ==="
              timeout 5 sudo docker exec "${name}" bridge fdb show 2>&1 || true
            } > gobgp-logs/${node}-network.txt 2>&1
          done

      - name: Upload GoBGP logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gobgp-logs
          path: gobgp-logs/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: sudo containerlab destroy --topo test/e2e/clab/topology-gobgp.clab.yml --cleanup

  e2e-vrnetlab:
    name: E2E EVPN Boot (vrnetlab)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build BOOTy vrnetlab VM image
        run: docker build -t booty-vrnetlab:latest -f test/e2e/clab/vrnetlab/Dockerfile .

      - name: Generate test disk image
        run: sudo test/e2e/clab/create-test-image.sh test/e2e/clab/images

      - name: Install ContainerLab
        run: curl -fsSL https://get.containerlab.dev | sudo bash -s -- -v ${{ env.CONTAINERLAB_VERSION }}

      - name: Deploy vrnetlab EVPN topology
        run: sudo containerlab deploy --topo test/e2e/clab/topology-vrnetlab.clab.yml

      - name: Wait for BGP convergence
        run: |
          echo "Waiting for BGP sessions to establish..."
          for i in $(seq 1 90); do
            if sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null \
               | grep -qE "[0-9]{2}:[0-9]{2}:[0-9]{2}"; then
              echo "BGP established after ${i}s"
              sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp summary"
              break
            fi
            sleep 1
          done
          if ! sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null | grep -qE "[0-9]{2}:[0-9]{2}:[0-9]{2}"; then
            echo "BGP did not converge in 90s"
            sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp summary" || true
            exit 1
          fi
          echo "Waiting for EVPN routes to appear after BGP convergence..."
          for i in $(seq 1 60); do
            if sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null | grep -qE "\[[0-9]+\]:\[[0-9]+\]"; then
              echo "EVPN routes detected after ${i}s"
              sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp l2vpn evpn"
              break
            fi
            sleep 1
          done
          if ! sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null | grep -qE "\[[0-9]+\]:\[[0-9]+\]"; then
            echo "EVPN routes did not appear in 60s after BGP convergence"
            sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp summary" || true
            sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp l2vpn evpn" || true
            exit 1
          fi

      - name: Wait for VM boot
        run: |
          echo "Waiting for BOOTy QEMU VM to start..."
          for i in $(seq 1 120); do
            if sudo docker logs clab-booty-vrnetlab-lab-booty-provision 2>&1 | grep -q "starting BOOTy\|Starting BOOTy"; then
              echo "BOOTy VM started after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "VM did not boot in 120s — dumping serial log:"
          sudo docker logs clab-booty-vrnetlab-lab-booty-provision 2>&1 | tail -50
          exit 1

      - name: Run vrnetlab EVPN E2E tests
        # -parallel=2 is a no-op without t.Parallel(); use GOMAXPROCS to cap OS threads.
        env:
          GOMAXPROCS: "2"
        run: go test -tags e2e_vrnetlab -v -race -count=1 -timeout 30m ./test/e2e/integration/...

      - name: Collect vrnetlab logs
        if: always()
        timeout-minutes: 8
        run: |
          mkdir -p vrnetlab-logs

          for node in booty-provision booty-deprovision booty-standby; do
            name="clab-booty-vrnetlab-lab-${node}"
            echo ""
            echo "======================================="
            echo "  ${node} SERIAL LOG"
            echo "======================================="
            timeout 30 sudo docker logs "${name}" 2>&1 | tee vrnetlab-logs/${node}-serial.log || echo "(no logs)"
            echo "======================================="
          done

          echo ""
          echo "======================================="
          echo "  CAPRF Mock Access Log"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-vrnetlab-lab-caprf-mock cat /var/log/nginx/access.log 2>/dev/null \
            | tee vrnetlab-logs/caprf-access.log || echo "(no logs)"

          echo ""
          echo "======================================="
          echo "  BGP Summary (spine01)"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp summary" 2>/dev/null \
            | tee vrnetlab-logs/bgp-summary.txt || true

          echo ""
          echo "======================================="
          echo "  BGP Neighbor Detail (spine01)"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp neighbor json" 2>/dev/null \
            | tee vrnetlab-logs/bgp-neighbor.json || true

          echo ""
          echo "======================================="
          echo "  BFD Peers (spine01)"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bfd peers json" 2>/dev/null \
            | tee vrnetlab-logs/bfd-peers.json || true

          echo ""
          echo "======================================="
          echo "  EVPN State (spine01)"
          echo "======================================="
          timeout 15 sudo docker exec clab-booty-vrnetlab-lab-spine01 vtysh -c "show bgp l2vpn evpn" 2>/dev/null \
            | tee vrnetlab-logs/evpn-state.txt || true

          # Check for unexpected ERROR-level log entries in vrnetlab serial logs
          ALLOWED_ERRORS="no suitable disk found|detect-disk|partition-disk|parse-partitions|format-disk|stream-image|[Pp]rovisioning failed|[Pp]rovisioning step|[Dd]eprovisioning failed|[Dd]eprovisioning step|Connecting to provisioning server|DEBUG DUMP|=== DEBUG|=== CONFIG|Disk Error|msg=DEBUG|debug dump|Debug command|DEBUG env|CAPRF client|dry-run failed"
          VRNETLAB_ERRORS=""
          for logfile in vrnetlab-logs/*-serial.log; do
            [ -f "$logfile" ] || continue
            UNEXPECTED=$(grep 'level=ERROR' "$logfile" 2>/dev/null | grep -vE "$ALLOWED_ERRORS" || true)
            if [ -n "$UNEXPECTED" ]; then
              echo "WARNING: Unexpected ERROR-level logs in $(basename "$logfile"):"
              echo "$UNEXPECTED"
              VRNETLAB_ERRORS="yes"
            fi
          done
          if [ -n "$VRNETLAB_ERRORS" ]; then
            echo "::warning::Unexpected ERROR-level log entries found in vrnetlab serial logs"
          fi

      - name: Upload vrnetlab logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vrnetlab-logs
          path: vrnetlab-logs/
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: sudo containerlab destroy --topo test/e2e/clab/topology-vrnetlab.clab.yml --cleanup
