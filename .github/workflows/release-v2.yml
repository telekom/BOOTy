name: Release v2

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }}/${{ matrix.flavor }})
    strategy:
      matrix:
        include:
          - arch: amd64
            flavor: default
            runner: ubuntu-latest
          - arch: amd64
            flavor: gobgp
            runner: ubuntu-latest
          - arch: amd64
            flavor: slim
            runner: ubuntu-latest
          - arch: amd64
            flavor: micro
            runner: ubuntu-latest
          - arch: arm64
            flavor: default
            runner: ubuntu-24.04-arm
          - arch: arm64
            flavor: gobgp
            runner: ubuntu-24.04-arm
          - arch: arm64
            flavor: slim
            runner: ubuntu-24.04-arm
          - arch: arm64
            flavor: micro
            runner: ubuntu-24.04-arm
      fail-fast: false
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Assert runner architecture
        run: |
          RUNNER_ARCH="$(uname -m)"
          case "${RUNNER_ARCH}" in
            x86_64)  EXPECTED="amd64" ;;
            aarch64) EXPECTED="arm64" ;;
            *)
              echo "::error::unsupported runner architecture: ${RUNNER_ARCH}"
              exit 1
              ;;
          esac
          if [ "${EXPECTED}" != "${{ matrix.arch }}" ]; then
            echo "::error::runner architecture ${EXPECTED} does not match matrix.arch ${{ matrix.arch }}"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build binary
        if: matrix.flavor == 'default'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CGO_ENABLED=1 GOOS=linux GOARCH=${{ matrix.arch }} CC=gcc \
            go build -ldflags "-s -w \
              -X main.Version=${VERSION} \
              -X main.Build=${{ github.sha }} \
              -linkmode external -extldflags '-static'" \
            -o booty-${{ matrix.arch }}

      - name: Build initramfs (${{ matrix.flavor }})
        run: |
          TARGET_ARG=""
          if [ "${{ matrix.flavor }}" != "default" ]; then
            TARGET_ARG="--target=${{ matrix.flavor }}"
          fi
          docker buildx build \
            ${TARGET_ARG} \
            --platform linux/${{ matrix.arch }} \
            --output type=local,dest=out-${{ matrix.flavor }} \
            -f initrd.Dockerfile .

      - name: Generate checksums
        run: |
          if [ -f booty-${{ matrix.arch }} ]; then
            sha256sum booty-${{ matrix.arch }} > booty-${{ matrix.arch }}.sha256
          fi
          if [ -f out-${{ matrix.flavor }}/initramfs.cpio.gz ]; then
            cp out-${{ matrix.flavor }}/initramfs.cpio.gz ${{ matrix.flavor }}-${{ matrix.arch }}-initramfs.cpio.gz
            sha256sum ${{ matrix.flavor }}-${{ matrix.arch }}-initramfs.cpio.gz > ${{ matrix.flavor }}-${{ matrix.arch }}-initramfs.cpio.gz.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-${{ matrix.flavor }}-${{ matrix.arch }}
          path: |
            booty-${{ matrix.arch }}
            booty-${{ matrix.arch }}.sha256
            ${{ matrix.flavor }}-${{ matrix.arch }}-initramfs.cpio.gz
            ${{ matrix.flavor }}-${{ matrix.arch }}-initramfs.cpio.gz.sha256
          if-no-files-found: ignore

  sbom:
    name: Generate SBOM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: sbom.spdx.json

  scan:
    name: Vulnerability Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          format: table

  sign:
    name: Sign Artifacts
    needs: [build, iso, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Sign checksums with Cosign
        run: |
          for f in $(find artifacts -name "*.sha256"); do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --bundle "${f}.bundle" \
              "$f"
          done

      - name: Upload signatures
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: signatures
          path: |
            artifacts/**/*.sig
            artifacts/**/*.bundle

  container:
    name: Container Image (${{ matrix.flavor }}/${{ matrix.arch }})
    needs: build
    strategy:
      matrix:
        include:
          - flavor: default
            arch: amd64
            runner: ubuntu-latest
          - flavor: default
            arch: arm64
            runner: ubuntu-24.04-arm
          - flavor: gobgp
            arch: amd64
            runner: ubuntu-latest
          - flavor: gobgp
            arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          TARGET_ARG=""
          IMAGE_TAG="${VERSION}"
          if [ "${{ matrix.flavor }}" = "gobgp" ]; then
            TARGET_ARG="--target=gobgp"
            IMAGE_TAG="${VERSION}-gobgp"
          fi
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker buildx build \
            ${TARGET_ARG} \
            --platform "linux/${{ matrix.arch }}" \
            --provenance=false \
            --push \
            -t "${IMAGE}:${IMAGE_TAG}-${{ matrix.arch }}" \
            -f initrd.Dockerfile .

  container-manifest:
    name: Container Manifest (${{ matrix.flavor }})
    needs: container
    runs-on: ubuntu-latest
    strategy:
      matrix:
        flavor: [default, gobgp]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE_TAG="${VERSION}"
          if [ "${{ matrix.flavor }}" = "gobgp" ]; then
            IMAGE_TAG="${VERSION}-gobgp"
          fi
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker manifest create "${IMAGE}:${IMAGE_TAG}" \
            "${IMAGE}:${IMAGE_TAG}-amd64" \
            "${IMAGE}:${IMAGE_TAG}-arm64"
          docker manifest push "${IMAGE}:${IMAGE_TAG}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Sign container image
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          IMAGE_TAG="${VERSION}"
          if [ "${{ matrix.flavor }}" = "gobgp" ]; then
            IMAGE_TAG="${VERSION}-gobgp"
          fi
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]'):${IMAGE_TAG}
          cosign sign --yes "${IMAGE}"

  iso:
    name: ISO (${{ matrix.flavor }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - flavor: default
            target: iso
            output: booty.iso
            artifact: booty-amd64.iso
          - flavor: gobgp
            target: gobgp-iso
            output: booty-gobgp.iso
            artifact: booty-gobgp-amd64.iso
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Build ISO
        run: |
          docker buildx build \
            --target ${{ matrix.target }} \
            --platform linux/amd64 \
            --output type=local,dest=out-iso \
            -f initrd.Dockerfile .
          mv out-iso/${{ matrix.output }} ${{ matrix.artifact }}

      - name: Generate checksums
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Upload ISO artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-iso-${{ matrix.flavor }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  iso-oci:
    name: ISO OCI (${{ matrix.flavor }})
    needs: iso
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - flavor: default
            artifact: booty-amd64.iso
            tag_suffix: ""
          - flavor: gobgp
            artifact: booty-gobgp-amd64.iso
            tag_suffix: "-gobgp"
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download ISO artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-iso-${{ matrix.flavor }}

      - name: Push ISO as OCI artifact
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=$(echo "ghcr.io/${{ github.repository }}-iso" | tr '[:upper:]' '[:lower:]')
          oras push "${REPO}:${VERSION}${{ matrix.tag_suffix }}" \
            --artifact-type application/vnd.booty.iso.v1 \
            "${{ matrix.artifact }}:application/octet-stream"

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Sign OCI artifact
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=$(echo "ghcr.io/${{ github.repository }}-iso" | tr '[:upper:]' '[:lower:]')
          cosign sign --yes "${REPO}:${VERSION}${{ matrix.tag_suffix }}"

  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Generate changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG.md

      - name: Upload changelog
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: changelog
          path: CHANGELOG.md

  release:
    name: Create GitHub Release
    needs: [build, iso, iso-oci, sbom, scan, sign, container-manifest, changelog, oci-artifacts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release-files
          find artifacts -type f \( -name "booty-*" -o -name "*.cpio.gz" -o -name "*.iso" -o -name "*.sha256" -o -name "*.sig" -o -name "*.bundle" -o -name "*.spdx.json" \) \
            -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          body_path: artifacts/changelog/CHANGELOG.md
          files: release-files/*

  oci-artifacts:
    name: Publish OCI Artifacts (${{ matrix.arch }})
    needs: [build, sbom, sign]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Install ORAS
        uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3
        with:
          version: "1.2.2"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts

      - name: Publish initramfs artifacts
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          for flavor in default gobgp slim micro; do
            INITRAMFS="artifacts/release-${flavor}-${{ matrix.arch }}/${flavor}-${{ matrix.arch }}-initramfs.cpio.gz"
            CHECKSUM="artifacts/release-${flavor}-${{ matrix.arch }}/${flavor}-${{ matrix.arch }}-initramfs.cpio.gz.sha256"

            if [ ! -f "${INITRAMFS}" ]; then
              echo "Skipping ${flavor}/${{ matrix.arch }}: no initramfs found"
              continue
            fi

            TAG="${VERSION}-${flavor}-${{ matrix.arch }}"
            echo "Publishing ${REPO}/initramfs:${TAG}"

            ARGS="${INITRAMFS}:application/vnd.cncf.initramfs.layer.v1+gzip"
            if [ -f "${CHECKSUM}" ]; then
              ARGS="${ARGS} ${CHECKSUM}:text/plain"
            fi

            oras push "${REPO}/initramfs:${TAG}" \
              --annotation "org.opencontainers.image.title=BOOTy initramfs (${flavor}/${{ matrix.arch }})" \
              --annotation "org.opencontainers.image.version=${VERSION}" \
              --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
              --annotation "io.booty.flavor=${flavor}" \
              --annotation "io.booty.arch=${{ matrix.arch }}" \
              ${ARGS}
          done

      - name: Publish binary artifact
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          BINARY="artifacts/release-default-${{ matrix.arch }}/booty-${{ matrix.arch }}"
          CHECKSUM="artifacts/release-default-${{ matrix.arch }}/booty-${{ matrix.arch }}.sha256"

          if [ ! -f "${BINARY}" ]; then
            echo "No binary found for ${{ matrix.arch }}, skipping"
            exit 0
          fi

          TAG="${VERSION}-${{ matrix.arch }}"
          echo "Publishing ${REPO}/binary:${TAG}"

          ARGS="${BINARY}:application/vnd.cncf.binary.layer.v1"
          if [ -f "${CHECKSUM}" ]; then
            ARGS="${ARGS} ${CHECKSUM}:text/plain"
          fi

          oras push "${REPO}/binary:${TAG}" \
            --annotation "org.opencontainers.image.title=BOOTy binary (${{ matrix.arch }})" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "io.booty.arch=${{ matrix.arch }}" \
            ${ARGS}

      - name: Publish SBOM artifact
        if: matrix.arch == 'amd64'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SBOM="artifacts/sbom/sbom.spdx.json"

          if [ ! -f "${SBOM}" ]; then
            echo "No SBOM found, skipping"
            exit 0
          fi

          echo "Publishing ${REPO}/sbom:${VERSION}"
          oras push "${REPO}/sbom:${VERSION}" \
            --annotation "org.opencontainers.image.title=BOOTy SBOM" \
            --annotation "org.opencontainers.image.version=${VERSION}" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            "${SBOM}:application/spdx+json"
