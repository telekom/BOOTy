name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUILD=${{ github.sha }}

          # amd64
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 CC=gcc \
            go build -ldflags "-s -w -X=main.Version=${VERSION} -X=main.Build=${BUILD} -linkmode external -extldflags '-static'" \
            -o booty-linux-amd64

          # arm64
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -ldflags "-s -w -X=main.Version=${VERSION} -X=main.Build=${BUILD} -linkmode external -extldflags '-static'" \
            -o booty-linux-arm64

      - name: Build and push initramfs image
        run: |
          docker buildx build --platform linux/amd64 --load \
            -t ghcr.io/telekom/booty:${GITHUB_REF_NAME#v} \
            -t ghcr.io/telekom/booty:latest \
            -f initrd.Dockerfile .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container image
        run: |
          docker push ghcr.io/telekom/booty:${GITHUB_REF_NAME#v}
          docker push ghcr.io/telekom/booty:latest

      - name: Extract initramfs from container
        run: |
          docker run --rm ghcr.io/telekom/booty:${GITHUB_REF_NAME#v} \
            cat /initramfs.cpio.gz > booty-initramfs.cpio.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            booty-linux-amd64
            booty-linux-arm64
            booty-initramfs.cpio.gz
