name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Install cross-compilation tools
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUILD=${{ github.sha }}

          # amd64
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 CC=gcc \
            go build -ldflags "-s -w -X=main.Version=${VERSION} -X=main.Build=${BUILD} -linkmode external -extldflags '-static'" \
            -o booty-linux-amd64

          # arm64
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc \
            go build -ldflags "-s -w -X=main.Version=${VERSION} -X=main.Build=${BUILD} -linkmode external -extldflags '-static'" \
            -o booty-linux-arm64

      - name: Build initramfs images
        run: |
          # Default (full FRR + tools)
          docker buildx build --platform linux/amd64 --load \
            -t ghcr.io/telekom/booty:${GITHUB_REF_NAME#v} \
            -t ghcr.io/telekom/booty:latest \
            -f initrd.Dockerfile .

          # GoBGP variant (no FRR)
          docker buildx build --platform linux/amd64 --target gobgp --load \
            -t ghcr.io/telekom/booty-gobgp:${GITHUB_REF_NAME#v} \
            -t ghcr.io/telekom/booty-gobgp:latest \
            -f initrd.Dockerfile .

          # Slim (DHCP-only)
          docker buildx build --platform linux/amd64 --target slim \
            --output type=local,dest=out-slim -f initrd.Dockerfile .

          # Micro (pure Go)
          docker buildx build --platform linux/amd64 --target micro \
            --output type=local,dest=out-micro -f initrd.Dockerfile .

      - name: Build ISO images
        run: |
          # Default ISO
          docker buildx build --platform linux/amd64 --target iso \
            --output type=local,dest=out-iso -f initrd.Dockerfile .

          # GoBGP ISO
          docker buildx build --platform linux/amd64 --target gobgp-iso \
            --output type=local,dest=out-gobgp-iso -f initrd.Dockerfile .

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push container images
        run: |
          docker push ghcr.io/telekom/booty:${GITHUB_REF_NAME#v}
          docker push ghcr.io/telekom/booty:latest
          docker push ghcr.io/telekom/booty-gobgp:${GITHUB_REF_NAME#v}
          docker push ghcr.io/telekom/booty-gobgp:latest

      - name: Extract initramfs from containers
        run: |
          # Use docker cp from a created (not started) container — the image is FROM scratch with no shell
          CID=$(docker create ghcr.io/telekom/booty:${GITHUB_REF_NAME#v})
          docker cp "$CID:/initramfs.cpio.gz" booty-initramfs.cpio.gz
          docker rm "$CID"

          CID=$(docker create ghcr.io/telekom/booty-gobgp:${GITHUB_REF_NAME#v})
          docker cp "$CID:/initramfs.cpio.gz" booty-gobgp-initramfs.cpio.gz
          docker rm "$CID"

      - name: Collect release artifacts
        run: |
          # Rename flavour outputs
          cp out-slim/initramfs.cpio.gz booty-slim-initramfs.cpio.gz
          cp out-micro/initramfs.cpio.gz booty-micro-initramfs.cpio.gz
          cp out-iso/booty.iso booty.iso
          cp out-gobgp-iso/booty-gobgp.iso booty-gobgp.iso

          echo "Release artifacts:"
          ls -lh booty-linux-* booty-*initramfs* booty*.iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            booty-linux-amd64
            booty-linux-arm64
            booty-initramfs.cpio.gz
            booty-gobgp-initramfs.cpio.gz
            booty-slim-initramfs.cpio.gz
            booty-micro-initramfs.cpio.gz
            booty.iso
            booty-gobgp.iso
