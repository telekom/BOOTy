version: "2"

linters:
  default: none
  enable:
    # Bug detection
    - govet
    - staticcheck
    - gosec
    - nilerr
    - nilnil
    - bodyclose
    - noctx
    # Error handling
    - errcheck
    - errorlint
    - wrapcheck
    # Code quality
    - ineffassign
    - unused
    - unconvert
    - misspell
    - revive
    - gocritic
    - cyclop
    - gocognit
    - nestif
    - funlen
    # Performance
    - prealloc
    # Style
    - godot
    - usestdlibvars
    - thelper
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    misspell:
      locale: US
    staticcheck:
      checks:
        - "all"
        - "-ST1018"
        - "-ST1000"
    cyclop:
      max-complexity: 15
    gocognit:
      min-complexity: 25
    funlen:
      lines: 80
      statements: 50
    nestif:
      min-complexity: 5
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    gosec:
      excludes:
        - G115 # integer overflow conversion — safe for file descriptors and VNI casts
        - G204 # subprocess launched with variable — intentional for exec.Command usage
        - G301 # directory permissions > 0750 — 0755 is standard for system directories
        - G304 # file path from variable — intentional for device operations
        - G306 # poor file permissions — we handle explicitly
        - G706 # log injection — values from local disk, not external input
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: increment-decrement
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
    wrapcheck:
      ignore-sigs:
        - ".Errorf("
        - "errors.New("
        - "errors.Join("
      ignore-package-globs:
        - github.com/telekom/BOOTy/*
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - wrapcheck
          - funlen
          - cyclop
          - gocognit
          - gosec
          - gocritic
      - path: pkg/ux/captain\.go
        linters:
          - funlen
      - path: main\.go
        linters:
          - cyclop
          - gocognit
          - funlen
      - linters:
          - revive
        text: "var-naming: avoid"

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
