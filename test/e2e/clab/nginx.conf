worker_processes 1;
events { worker_connections 64; }

http {
    access_log /var/log/nginx/access.log;

    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        location /images/ {
            alias /srv/images/;
            autoindex on;
        }
    }
}
