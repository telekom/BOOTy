name: booty-lacp-lab

# NOTE: The 'switch' node is a simple Linux bridge and does not support
# 802.3ad LACP negotiation. This topology validates multi-link bond
# connectivity (e.g. balance-rr), not full LACP.

topology:
  nodes:
    switch:
      kind: linux
      image: alpine:3.20
      cmd: sleep infinity
      exec:
        # Create a bridge for bonded links
        - ip link add br-bond type bridge
        - ip link set br-bond up
        - ip link set eth1 master br-bond
        - ip link set eth2 master br-bond
        - ip link set eth1 up
        - ip link set eth2 up
        - ip addr add 10.201.0.1/24 dev br-bond

    booty:
      kind: linux
      image: alpine:3.20
      cmd: sleep infinity
      exec:
        - ip link set eth1 up
        - ip link set eth2 up

  links:
    - endpoints: ["switch:eth1", "booty:eth1"]
    - endpoints: ["switch:eth2", "booty:eth2"]
