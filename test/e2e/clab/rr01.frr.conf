! Route reflector FRR config for GoBGP e2e topology (dual mode).
! Provides iBGP L2VPN-EVPN sessions for BOOTy nodes that use dual mode.
!
!   eth1 → spine01 (iBGP 10.0.1.2/30 ↔ 10.0.1.1)
!   eth2 → booty-dual (iBGP 10.0.3.1/30 ↔ 10.0.3.2, route-reflector-client)
!
frr version 10.3.1
frr defaults datacenter
!
interface lo
 ip address 10.0.0.3/32
exit
!
interface eth1
 ip address 10.0.1.2/30
exit
!
interface eth2
 ip address 10.0.3.1/30
exit
!
router bgp 65000
 bgp router-id 10.0.0.3
 no bgp ebgp-requires-policy
 !
 ! ── iBGP to spine ───────────────────────────────────────────────
 neighbor 10.0.1.1 remote-as 65000
 neighbor 10.0.1.1 description spine01
 neighbor 10.0.1.1 update-source 10.0.1.2
 !
 ! ── iBGP to booty-dual (route-reflector client) ─────────────────
 neighbor 10.0.3.2 remote-as 65010
 neighbor 10.0.3.2 description booty-dual
 neighbor 10.0.3.2 update-source 10.0.3.1
 !
 address-family ipv4 unicast
  neighbor 10.0.1.1 activate
  neighbor 10.0.3.2 activate
  neighbor 10.0.3.2 route-reflector-client
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor 10.0.1.1 activate
  neighbor 10.0.3.2 activate
  neighbor 10.0.3.2 route-reflector-client
  advertise-all-vni
 exit-address-family
exit
!
