# vrnetlab EVPN topology: real QEMU VM boot of BOOTy on an EVPN fabric.
# BOOTy runs as PID 1 inside QEMU VMs, connected to the spine/leaf fabric
# via tap→bridge→containerlab links. Traffic traverses real VXLAN/BGP.
#
# Build the VM image first:
#   docker build -t booty-vrnetlab:latest -f test/e2e/clab/vrnetlab/Dockerfile .
name: booty-vrnetlab-lab

topology:
  nodes:
    # ── EVPN Fabric ────────────────────────────────────────────────────
    spine01:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - spine01.frr.conf:/etc/frr/frr.conf:ro
        - daemons:/etc/frr/daemons:ro
      exec:
        - ip link set dev eth1 mtu 9000
        - ip link add vxlan100 type vxlan id 100 dstport 4789 local 10.0.0.1 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        # Client-facing interface (on bridge)
        - ip link set dev eth2 master br100
        - ip link set dev eth2 up
        # QEMU VM interfaces — L3 underlay for BGP peering (NOT on br100)
        - ip link set dev eth3 mtu 9000
        - ip link set dev eth3 up
        - ip link set dev eth4 mtu 9000
        - ip link set dev eth4 up
        - ip link set dev eth5 mtu 9000
        - ip link set dev eth5 up

    leaf01:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - leaf01.frr.conf:/etc/frr/frr.conf:ro
        - daemons:/etc/frr/daemons:ro
      exec:
        - ip link set dev eth1 mtu 9000
        - ip link add vxlan100 type vxlan id 100 dstport 4789 local 10.0.0.2 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        - ip link set dev eth2 master br100
        - ip link set dev eth2 up
        - ip link set dev eth3 master br100
        - ip link set dev eth3 up

    # ── Service containers (linux kind) ────────────────────────────────
    client:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 10.100.0.100/24 dev eth1
        - ip link set dev eth1 up
      cmd: sleep infinity

    nginx:
      kind: linux
      image: nginx:alpine
      cmd: sh -c "rm -f /var/log/nginx/access.log && touch /var/log/nginx/access.log && nginx -g 'daemon off;'"
      binds:
        - nginx.conf:/etc/nginx/nginx.conf:ro
        - html:/usr/share/nginx/html:ro
        - images:/srv/images:ro
      exec:
        - ip addr add 10.100.0.10/24 dev eth1
        - ip link set dev eth1 up

    caprf-mock:
      kind: linux
      image: nginx:alpine
      # Override CMD: remove /dev/stdout symlink so access_log writes to a real
      # file that tests can read with "docker exec ... cat".
      cmd: sh -c "rm -f /var/log/nginx/access.log && touch /var/log/nginx/access.log && nginx -g 'daemon off;'"
      binds:
        - caprf-mock.conf:/etc/nginx/nginx.conf:ro
        - images:/srv/images:ro
        - data:/srv/data:ro
      exec:
        - ip addr add 10.100.0.11/24 dev eth1
        - ip link set dev eth1 up

    # ── QEMU VM nodes: BOOTy boots as real PID 1 init ─────────────────
    booty-provision:
      kind: linux
      image: booty-vrnetlab:latest
      binds:
        - data/vars-provision:/deploy/vars:ro

    booty-deprovision:
      kind: linux
      image: booty-vrnetlab:latest
      binds:
        - data/vars-deprovision:/deploy/vars:ro

    booty-standby:
      kind: linux
      image: booty-vrnetlab:latest
      binds:
        - data/vars-standby:/deploy/vars:ro

  links:
    # Fabric link (eBGP between spine and leaf)
    - endpoints: ["spine01:eth1", "leaf01:eth1"]
    # Client on spine's bridge (for L2 connectivity check)
    - endpoints: ["spine01:eth2", "client:eth1"]
    # Services on leaf's bridge (reachable through EVPN)
    - endpoints: ["leaf01:eth2", "nginx:eth1"]
    - endpoints: ["leaf01:eth3", "caprf-mock:eth1"]
    # QEMU VMs on spine's bridge (traffic crosses VXLAN to reach services)
    - endpoints: ["spine01:eth3", "booty-provision:eth1"]
    - endpoints: ["spine01:eth4", "booty-deprovision:eth1"]
    - endpoints: ["spine01:eth5", "booty-standby:eth1"]
