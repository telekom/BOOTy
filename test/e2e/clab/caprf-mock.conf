worker_processes 1;
events { worker_connections 64; }

http {
    # Log format that captures requests for test assertions
    log_format caprf '$time_local $remote_addr "$request" $status';
    access_log /var/log/nginx/access.log caprf;

    server {
        listen 80;

        # Health check (used by E2E connectivity tests)
        location = /health {
            return 200 'ok';
        }

        # Status endpoints — accept POST, return 200
        location ~ ^/status/(init|success|error|heartbeat)$ {
            if ($request_method != POST) {
                return 405;
            }
            return 200 '{"status":"ok"}';
        }

        # Commands endpoint — return 204 No Content (no pending commands)
        location = /commands {
            return 204;
        }

        # Log collection endpoint
        location = /log {
            if ($request_method != POST) {
                return 405;
            }
            return 200;
        }

        # Debug collection endpoint
        location = /debug {
            if ($request_method != POST) {
                return 405;
            }
            return 200;
        }

        # Vars file — serves /deploy/vars content for ParseVars
        location = /vars {
            alias /srv/data/vars;
            default_type text/plain;
        }

        # Per-mode vars files for multi-flavour boot tests
        location = /vars-provision {
            alias /srv/data/vars-provision;
            default_type text/plain;
        }
        location = /vars-deprovision {
            alias /srv/data/vars-deprovision;
            default_type text/plain;
        }
        location = /vars-standby {
            alias /srv/data/vars-standby;
            default_type text/plain;
        }

        # Commands with data — returns actual command JSON
        location = /commands-data {
            alias /srv/data/commands.json;
            default_type application/json;
        }

        # Image serving
        location /images/ {
            alias /srv/images/;
            autoindex on;
        }

        # Access log endpoint for test assertions
        location = /access-log {
            alias /var/log/nginx/access.log;
            default_type text/plain;
        }
    }
}
