# Extended topology for full BOOTy boot testing.
# Adds 3 BOOTy nodes (provision, deprovision, standby) that run BOOTy
# on the same EVPN fabric, each with its own /deploy/vars config.
# The booty-test image must be built before deploying:
#   docker build -t booty-test -f test/e2e/clab/booty-test.Dockerfile .
name: booty-boot-lab

topology:
  nodes:
    spine01:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - spine01.frr.conf:/etc/frr/frr.conf:ro
        - daemons:/etc/frr/daemons:ro
      exec:
        # eth1 → leaf01 (eBGP fabric underlay)
        - ip link set dev eth1 mtu 9000
        - ip link add vxlan100 type vxlan id 100 dstport 4789 local 10.0.0.1 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        # eth2 → client (L2 on br100)
        - ip link set dev eth2 master br100
        - ip link set dev eth2 up
        # eth3 → booty-provision (L3 underlay, NOT on br100)
        - ip link set dev eth3 mtu 9000
        - ip link set dev eth3 up
        # eth4 → booty-deprovision (L3 underlay, NOT on br100)
        - ip link set dev eth4 mtu 9000
        - ip link set dev eth4 up
        # eth5 → booty-standby (L3 underlay, NOT on br100)
        - ip link set dev eth5 mtu 9000
        - ip link set dev eth5 up

    leaf01:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - leaf01.frr.conf:/etc/frr/frr.conf:ro
        - daemons:/etc/frr/daemons:ro
      exec:
        # eth1 → spine01 (eBGP fabric underlay)
        - ip link set dev eth1 mtu 9000
        - ip link add vxlan100 type vxlan id 100 dstport 4789 local 10.0.0.2 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        # eth2 → nginx (image server, L2 on br100)
        - ip link set dev eth2 master br100
        - ip link set dev eth2 up
        # eth3 → caprf-mock (provisioning API, L2 on br100)
        - ip link set dev eth3 master br100
        - ip link set dev eth3 up

    client:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 10.100.0.100/24 dev eth1
        - ip link set dev eth1 up
      cmd: sleep infinity

    nginx:
      kind: linux
      image: nginx:alpine
      binds:
        - nginx.conf:/etc/nginx/nginx.conf:ro
        - html:/usr/share/nginx/html:ro
        - images:/srv/images:ro
      exec:
        - ip addr add 10.100.0.10/24 dev eth1
        - ip link set dev eth1 up
        - sh -c 'rm -f /var/log/nginx/access.log && touch /var/log/nginx/access.log && nginx -s reload'

    caprf-mock:
      kind: linux
      image: nginx:alpine
      binds:
        - caprf-mock.conf:/etc/nginx/nginx.conf:ro
        - images:/srv/images:ro
        - data:/srv/data:ro
      exec:
        - ip addr add 10.100.0.11/24 dev eth1
        - ip link set dev eth1 up
        - sh -c 'rm -f /var/log/nginx/access.log && touch /var/log/nginx/access.log && nginx -s reload'

    # ── BOOTy boot nodes: one per mode, all on spine's L3 underlay ────
    booty-provision:
      kind: linux
      image: booty-test:latest
      binds:
        - data/vars-provision:/deploy/vars:ro
      env:
        BOOTY_NO_REBOOT: "1"
      exec:
        # Create a 2 GiB sparse disk image and attach as loop device for provisioning.
        - dd if=/dev/zero of=/tmp/disk.img bs=1M count=0 seek=2048
        - losetup /dev/loop0 /tmp/disk.img

    booty-deprovision:
      kind: linux
      image: booty-test:latest
      binds:
        - data/vars-deprovision:/deploy/vars:ro
      env:
        BOOTY_NO_REBOOT: "1"

    booty-standby:
      kind: linux
      image: booty-test:latest
      binds:
        - data/vars-standby:/deploy/vars:ro
      env:
        BOOTY_NO_REBOOT: "1"

  links:
    # ── Fabric ──────────────────────────────────────────────────────
    - endpoints: ["spine01:eth1", "leaf01:eth1"]              # eBGP underlay

    # ── Spine-side L2 segment (br100, VXLAN VNI 100) ───────────────
    - endpoints: ["spine01:eth2", "client:eth1"]              # test client

    # ── Leaf-side L2 segment (br100, VXLAN VNI 100) ────────────────
    - endpoints: ["leaf01:eth2", "nginx:eth1"]                # image server
    - endpoints: ["leaf01:eth3", "caprf-mock:eth1"]           # provisioning API

    # ── BOOTy nodes → spine L3 underlay (BGP unnumbered) ───────────
    - endpoints: ["spine01:eth3", "booty-provision:eth1"]     # provision mode
    - endpoints: ["spine01:eth4", "booty-deprovision:eth1"]   # deprovision mode
    - endpoints: ["spine01:eth5", "booty-standby:eth1"]       # standby mode
