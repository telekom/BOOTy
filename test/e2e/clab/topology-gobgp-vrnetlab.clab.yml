# vrnetlab GoBGP topology: QEMU VM boot of BOOTy with GoBGP for all PeerModes.
# BOOTy runs as PID 1 inside QEMU VMs, using in-process GoBGP (no FRR).
#
# Three peer modes under test:
#   booty-unnumbered  eBGP unnumbered to spine (IPv4 + L2VPN-EVPN)
#   booty-dual        eBGP unnumbered to spine (IPv4) + iBGP numbered to rr01 (EVPN)
#   booty-numbered    eBGP numbered to spine (all families, static IP)
#
# Build the VM image first:
#   docker build -t booty-vrnetlab:latest -f test/e2e/clab/vrnetlab/Dockerfile .
name: booty-gobgp-vrnetlab-lab

topology:
  nodes:
    # ── EVPN Fabric (FRR) ──────────────────────────────────────────────
    spine01:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - spine01-gobgp.frr.conf:/etc/frr/frr.conf:ro
        - daemons:/etc/frr/daemons:ro
      exec:
        - ip link set dev eth1 mtu 9000
        - ip link add vxlan100 type vxlan id 100 dstport 4789 local 10.0.0.1 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        - ip link set dev eth2 master br100
        - ip link set dev eth2 up
        # eth3 → booty-unnumbered VM (eBGP unnumbered)
        - ip link set dev eth3 mtu 9000
        - ip link set dev eth3 up
        # eth4 → booty-dual VM (eBGP unnumbered)
        - ip link set dev eth4 mtu 9000
        - ip link set dev eth4 up
        # eth5 → booty-numbered VM (eBGP numbered 10.0.2.1/30)
        - ip link set dev eth5 mtu 9000
        - ip link set dev eth5 up
        # eth6 → rr01 (iBGP 10.0.1.1/30)
        - ip link set dev eth6 mtu 9000
        - ip link set dev eth6 up

    leaf01:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - leaf01.frr.conf:/etc/frr/frr.conf:ro
        - daemons:/etc/frr/daemons:ro
      exec:
        - ip link set dev eth1 mtu 9000
        - ip link add vxlan100 type vxlan id 100 dstport 4789 local 10.0.0.2 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set vxlan100 up
        - ip link set br100 up
        - ip link set dev eth2 master br100
        - ip link set dev eth2 up
        - ip link set dev eth3 master br100
        - ip link set dev eth3 up

    rr01:
      kind: linux
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - rr01.frr.conf:/etc/frr/frr.conf:ro
        - daemons:/etc/frr/daemons:ro
      exec:
        - ip link set dev eth1 mtu 9000
        - ip link set dev eth1 up
        - ip link set dev eth2 mtu 9000
        - ip link set dev eth2 up
        - ip link add vxlan100 type vxlan id 100 dstport 4789 local 10.0.0.3 nolearning
        - ip link add br100 type bridge
        - ip link set vxlan100 master br100
        - ip link set vxlan100 up
        - ip link set br100 up

    # ── Service containers ─────────────────────────────────────────────
    client:
      kind: linux
      image: alpine:3.20
      exec:
        - ip addr add 10.100.0.100/24 dev eth1
        - ip link set dev eth1 up
      cmd: sleep infinity

    nginx:
      kind: linux
      image: nginx:alpine
      cmd: sh -c "rm -f /var/log/nginx/access.log && touch /var/log/nginx/access.log && nginx -g 'daemon off;'"
      binds:
        - nginx.conf:/etc/nginx/nginx.conf:ro
        - html:/usr/share/nginx/html:ro
        - images:/srv/images:ro
      exec:
        - ip addr add 10.100.0.10/24 dev eth1
        - ip link set dev eth1 up

    caprf-mock:
      kind: linux
      image: nginx:alpine
      cmd: sh -c "rm -f /var/log/nginx/access.log && touch /var/log/nginx/access.log && nginx -g 'daemon off;'"
      binds:
        - caprf-mock.conf:/etc/nginx/nginx.conf:ro
        - images:/srv/images:ro
        - data:/srv/data:ro
      exec:
        - ip addr add 10.100.0.11/24 dev eth1
        - ip link set dev eth1 up

    # ── QEMU VM nodes: BOOTy boots as real PID 1 with GoBGP ───────────
    booty-unnumbered:
      kind: linux
      image: booty-vrnetlab:latest
      binds:
        - data/vars-gobgp-unnumbered-vm:/deploy/vars:ro

    booty-dual:
      kind: linux
      image: booty-vrnetlab:latest
      binds:
        - data/vars-gobgp-dual-vm:/deploy/vars:ro

    booty-numbered:
      kind: linux
      image: booty-vrnetlab:latest
      binds:
        - data/vars-gobgp-numbered-vm:/deploy/vars:ro

  links:
    # ── Fabric ──────────────────────────────────────────────────────
    - endpoints: ["spine01:eth1", "leaf01:eth1"]

    # ── Spine-side L2 segment ──────────────────────────────────────
    - endpoints: ["spine01:eth2", "client:eth1"]

    # ── Leaf-side L2 segment ───────────────────────────────────────
    - endpoints: ["leaf01:eth2", "nginx:eth1"]
    - endpoints: ["leaf01:eth3", "caprf-mock:eth1"]

    # ── BGP unnumbered: booty-unnumbered → spine ───────────────────
    - endpoints: ["spine01:eth3", "booty-unnumbered:eth1"]

    # ── BGP dual: booty-dual → spine (unnumbered) ──────────────────
    - endpoints: ["spine01:eth4", "booty-dual:eth1"]

    # ── BGP numbered: booty-numbered → spine (10.0.2.0/30) ─────────
    - endpoints: ["spine01:eth5", "booty-numbered:eth1"]

    # ── iBGP: spine ↔ rr01 (10.0.1.0/30) ──────────────────────────
    - endpoints: ["spine01:eth6", "rr01:eth1"]

    # ── iBGP: rr01 ↔ booty-dual (10.0.3.0/30) ─────────────────────
    - endpoints: ["rr01:eth2", "booty-dual:eth2"]
