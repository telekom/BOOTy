! Spine FRR config for GoBGP e2e topology.
! Supports three BOOTy peer modes simultaneously:
!   eth3 → booty-unnumbered  (eBGP unnumbered, all AFI/SAFI)
!   eth4 → booty-dual        (eBGP unnumbered, IPv4 only from BOOTy side)
!   eth5 → booty-numbered    (eBGP numbered 10.0.2.1/30 ↔ 10.0.2.2)
!   eth6 → rr01              (iBGP numbered 10.0.1.1/30 ↔ 10.0.1.2)
!
frr version 10.3.1
frr defaults datacenter
!
interface lo
 ip address 10.0.0.1/32
exit
!
! Point-to-point links for numbered peers
interface eth5
 ip address 10.0.2.1/30
exit
!
interface eth6
 ip address 10.0.1.1/30
exit
!
! Enable IPv6 ND on unnumbered interfaces so zebra processes incoming
! Router Advertisements and can discover the peer's link-local address.
! Without this, bgpd's "neighbor ethX interface" stays at bgpNeighborAddr=none.
interface eth3
 ipv6 nd ra-interval 10
 no ipv6 nd suppress-ra
exit
!
interface eth4
 ipv6 nd ra-interval 10
 no ipv6 nd suppress-ra
exit
!
router bgp 65000
 bgp router-id 10.0.0.1
 no bgp ebgp-requires-policy
 !
 ! ── Unnumbered fabric peers (eBGP) ──────────────────────────────
 neighbor fabric peer-group
 neighbor fabric remote-as external
 neighbor fabric bfd
 neighbor eth1 interface peer-group fabric
 neighbor eth3 interface peer-group fabric
 neighbor eth4 interface peer-group fabric
 !
 ! ── Numbered eBGP peer: booty-numbered ──────────────────────────
 neighbor 10.0.2.2 remote-as 65030
 neighbor 10.0.2.2 description booty-numbered
 !
 ! ── iBGP peer: rr01 (route reflector) ───────────────────────────
 neighbor 10.0.1.2 remote-as 65000
 neighbor 10.0.1.2 description rr01
 neighbor 10.0.1.2 update-source 10.0.1.1
 !
 address-family ipv4 unicast
  neighbor fabric activate
  neighbor 10.0.2.2 activate
  neighbor 10.0.1.2 activate
  redistribute connected
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor fabric activate
  neighbor 10.0.2.2 activate
  neighbor 10.0.1.2 activate
  advertise-all-vni
 exit-address-family
exit
!
ip prefix-list LOOPBACK seq 10 permit 10.0.0.1/32
!
route-map LOOPBACK permit 10
 match ip address prefix-list LOOPBACK
exit
!
